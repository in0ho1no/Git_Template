name: Security Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run semgrep
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            -w /src \
            semgrep/semgrep:v1.166.0 \
            semgrep scan --config p/default --metrics=off --error --quiet .

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Run gitleaks
        run: |
          # コンテナ内の root と runner のユーザーが異なるため、
          # safe.directory を渡さないと git が dubious ownership エラーになる
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            -e GIT_CONFIG_COUNT=1 \
            -e GIT_CONFIG_KEY_0=safe.directory \
            -e GIT_CONFIG_VALUE_0=/repo \
            gitleaks/gitleaks:v8.30.1 \
            detect --source . --no-banner --redact
