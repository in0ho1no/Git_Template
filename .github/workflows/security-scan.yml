name: Security Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Build semgrep image
        run: docker build -t local-semgrep docker/semgrep/
      - name: Run semgrep
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            -w /src \
            local-semgrep \
            semgrep scan --config p/default --metrics=off --error --quiet .

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Build gitleaks image
        run: docker build -t local-gitleaks docker/gitleaks/
      - name: Run gitleaks
        run: |
          # コンテナ内の root と runner のユーザーが異なるため、
          # safe.directory を渡さないと git が dubious ownership エラーになる
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            -e GIT_CONFIG_COUNT=1 \
            -e GIT_CONFIG_KEY_0=safe.directory \
            -e GIT_CONFIG_VALUE_0=/repo \
            local-gitleaks \
            detect --source . --no-banner --redact
